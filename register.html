<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>服登録</title>

<style>
.preview {
    width: 250px;
    height: 250px;
    border: 2px solid #ccc;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}
.preview img {
    max-width: 100%;
    max-height: 100%;
}

.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 320px;
    max-width: 90%;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.modal-preview {
    width: 200px;
    height: 200px;
    border: 1px dashed #aaa;
    margin: 10px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f9f9f9;
}
.modal-preview img {
    max-width: 100%;
    max-height: 100%;
}

.modal-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}
.modal-buttons button {
    padding: 8px 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>服を登録</h2>

<div class="preview">
    <img id="previewImage">
</div>

<br>

<input type="file" id="imageInput" accept="image/*">

<br><br>

<label>カテゴリ</label>
<select id="category">
    <option>トップス</option>
    <option>ボトムス</option>
    <option>ワンピース</option>
    <option>アウター</option>
    <option>シューズ</option>
    <option>アクセサリー</option>
</select>

<br><br>

<label>状態</label>
<select id="status">
    <option>所持服</option>
    <option>未所持服</option>
</select>

<br><br>

<label>メモ</label><br>
<textarea id="memo" rows="4" cols="30"></textarea>

<br><br>

<button onclick="saveClothes()">保存</button>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-content">
        <h3>登録内容の確認</h3>
        
        <p><strong>【切り抜き結果】</strong></p>
        <div class="modal-preview">
            <img id="croppedPreviewImage" alt="切り抜き画像">
        </div>

        <p><strong>カテゴリ:</strong> <span id="confirmCategory"></span></p>
        <p><strong>状態:</strong> <span id="confirmStatus"></span></p>
        <p><strong>メモ:</strong> <span id="confirmMemo"></span></p>
        <p id="confirmAiInfo" style="font-size: 0.8em; color: #555;"></p>

        <div class="modal-buttons">
            <button onclick="closeModal()">キャンセル（修正する）</button>
            <button onclick="submitToFirebase()" style="background-color: #4CAF50; color: white; border: none;">この内容で登録</button>
        </div>
    </div>
</div>

<script src="JavaScript/register.js"></script>

</body>
</html>
