<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordiary - Coordinate</title>
    <link rel="stylesheet" href="css/style1.css">
</head>

<body>

<header class="top-bar">
    <h1>coordinate</h1>
</header>


<div id="coordinate-container">


    <!-- クローゼット表示 -->
    <div id="closet-area">

        <h2>Closet</h2>

        <div class="filter">

            <button onclick="showClothes('すべて')">
                すべて
            </button>

            <button onclick="showClothes('所持服')">
                所持服
            </button>

            <button onclick="showClothes('未所持服')">
                未所持服
            </button>

        </div>


        <div id="closet-items"></div>


    </div>



    <!-- コーデ作成エリア -->

    <div id="coordinate-area">


        <div class="side-left">

            <button class="circle-btn" id="clearBtn">
                破棄
            </button>


            <button class="circle-btn" id="saveBtn">
                保存
            </button>


        </div>



        <div id="drop-area" class="coord-canvas">


            <p class="guide-text">
                ここに服をドラッグ＆ドロップ
            </p>


        </div>


    </div>


</div>
