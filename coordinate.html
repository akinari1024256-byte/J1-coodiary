<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coordiary - Coordinate</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="top-bar">
        <h1>Coordinate</h1>
    </header>

    <main class="coord-main">

        <!-- クローゼット -->
        <section class="closet">

            <h2>Closet</h2>

        <!-- 所持状態フィルター -->
        <select id="filterStatus" onchange="changeStatusFilter()">

            <option value="all">すべて</option>
            <option value="所持服">所持服のみ</option>
            <option value="未所持服">未所持服のみ</option>

        </select>

        <!-- カテゴリ -->
        <select id="filterCategory" onchange="changeCategory()">
            <option value="すべて">すべて</option>
            <option value="トップス">トップス</option>
            <option value="ボトムス">ボトムス</option>
            <option value="ワンピース">ワンピース</option>
            <option value="アウター">アウター</option>
            <option value="シューズ">シューズ</option>
            <option value="アクセサリー">アクセサリー</option>
        </select>



        <!-- 服一覧 -->
        <div id="closet-items" class="closet-list"></div>

    </section>

    <!-- コーデ作成 -->
    <section class="coord-section">
        <div class="side-left">
            <button id="clearBtn" class="circle-btn delete">🗑</button>
            <button id="saveBtn" class="circle-btn save">💾</button>
        </div>

        <!-- コーデキャンバス -->
        <div id="drop-area" class="coord-canvas">
            <p class="guide-text">服を選択してください</p>
        </div>

    </section>

</main>

<nav class="bottom-nav">

            <a href="closet.html">
                <img src="images/closet.png">
                <span>Closet</span>
            </a>

            <a href="coordinate.html">
                <img src="images/coordinate.png">
                <span>Coordinate</span>
            </a>

            <a href="outfit.html" class="active">
                <img src="images/outfit.png">
                <span>Outfit</span>
            </a>

        </nav>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="JavaScript/coordinate.js"></script>

</body>

</html>
