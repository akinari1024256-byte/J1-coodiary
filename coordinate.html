<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coordiary - Coordinate</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="top-bar">
        <h1>Coordinate</h1>
    </header>

    <main class="coord-main">

        <!-- クローゼット -->
        <section class="closet">

            <h2>Closet</h2>

        <!-- 所持状態フィルター -->
        <select id="filterStatus" onchange="changeStatusFilter()">

            <option value="all">すべて</option>
            <option value="所持服">所持服のみ</option>
            <option value="未所持服">未所持服のみ</option>

        </select>

        <!-- カテゴリ -->
        <div id="category-list">

            <div class="category-item active"
            onclick="changeCategory('すべて')">
                すべて
            </div>
            <div class="category-item"
            onclick="changeCategory('トップス')">
                トップス
            </div>
            <div class="category-item"
            onclick="changeCategory('ボトムス')">
                ボトムス
            </div>
            <div class="category-item"
            onclick="changeCategory('ワンピース')">
                ワンピース
            </div>
            <div class="category-item"
            onclick="changeCategory('アウター')">
                アウター
            </div>
            <div class="category-item"
            onclick="changeCategory('シューズ')">
                シューズ
            </div>
            <div class="category-item"
            onclick="changeCategory('アクセサリー')">
                アクセサリー
            </div>
        </div>



        <!-- 服一覧 -->
        <div id="closet-items" class="closet-list"></div>

    </section>

    <!-- コーデ作成 -->
    <section class="coord-section">
        <div class="side-left">
            <button id="clearBtn" class="circle-btn delete">🗑</button>
            <button id="saveBtn" class="circle-btn save">💾</button>
        </div>

        <!-- コーデキャンバス -->
        <div id="drop-area" class="coord-canvas">
            <p class="guide-text">服を選択してください</p>
        </div>

    </section>

</main>

<!-- 下部ナビ -->
<nav class="bottom-nav">
    <a href="closet.html">
        <img src="images/closet.png">
    </a>

    <a href="coordinate.html" class="active">
        <img src="images/coordinate.png">
    </a>

    <a href="outfit.html">
        <img src="images/outfit.png">
    </a>
</nav>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="JavaScript/coordinate.js"></script>

</body>

</html>
