<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>コーデ保存</title>
</head>
<body>

<div class="preview" style="width: 250px; height: 250px; border: 2px solid #ccc; overflow: hidden; display: flex; justify-content: center; align-items: center;">
    <img id="outfitPreviewImage" src="" style="max-width: 100%; max-height: 100%;">
</div>

<br>

<label>日付</label><br>
<input type="date" id="outfitDate">

<br><br>

<label>気温</label><br>
<input type="text" id="outfitTemp" placeholder="25">

<br><br>

<label>天気</label><br>
<select id="outfitWeather">
    <option>晴れ</option>
    <option>曇り</option>
    <option>雨</option>
    <option>雪</option>
</select>

<br><br>

<label>タグ</label><br>
<input type="text" id="outfitTag" placeholder="デート・通学など">

<br><br>

<label>メモ</label><br>
<textarea id="outfitMemo" rows="4" cols="30"></textarea>

<br><br>

<button onclick="saveOutfit()">保存する</button>

<script src="JavaScript/outfit-register.js"></script>

</body>
</html>
