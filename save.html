<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コーデ保存</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>コーデを保存</h2>

<!-- プレビュー -->
<div class="save-preview">
    <div id="previewArea"></div>
</div>

<br>

<!-- 日付 -->
<label for="date">日付</label><br>
<input type="date" id="date">

<br><br>

<!-- 気温 -->
<label for="temp">気温</label><br>
<input
    type="number"
    id="temp"
    placeholder="25"
>

<br><br>

<!-- 天気 -->
<label for="weather">天気</label><br>
<select id="weather">
    <option>晴れ</option>
    <option>曇り</option>
    <option>雨</option>
    <option>雪</option>
</select>

<br><br>

<!-- タグ -->
<label for="tag">タグ</label><br>
<input
    type="text"
    id="tag"
    placeholder="デート・通学など"
>

<br><br>

<!-- メモ -->
<label for="memo">メモ</label><br>
<textarea
    id="memo"
    rows="4"
    cols="30"
></textarea>

<br><br>

<!-- 保存ボタン -->
<button id="finishSave">
    保存する
</button>

<script src="JavaScript/save.js"></script>

</body>
</html>
