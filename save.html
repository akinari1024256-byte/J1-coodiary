<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保存</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>コーデを保存</h1>
</header>

<main>

    <div class="preview">
        <h2>プレビュー</h2>
        <div id="previewArea"></div>
    </div>

    <div class="form">
        <label>日付</label>
        <input type="date" id="date">

        <label>気温</label>
        <input type="number" id="temp" placeholder="25">

        <label>天気</label>
        <select id="weather">
            <option>晴れ</option>
            <option>曇り</option>
            <option>雨</option>
            <option>雪</option>
        </select>

        <label>タグ</label>
        <input
        type="text"
        id="tag"
        placeholder="デート・通学など">
        
        <label>メモ</label>
        <textarea id="memo"></textarea>
        <button id="finishSave">保存する</button>

<label>日付</label>
<input type="date" id="date">

<label>気温</label>
<input type="number" id="temp" placeholder="25">

<label>天気</label>
<select id="weather">
    <option>晴れ</option>
    <option>曇り</option>
    <option>雨</option>
    <option>雪</option>
</select>

<label>タグ</label>
<input
type="text"
id="tag"
placeholder="デート・通学など">

<label>メモ</label>
<textarea id="memo" rows="4" cols="30"></textarea>

<button id="finishSave">保存</button>

</div>

</main>

<script src="JavaScript/save.js"></script>

</body>
</html>
